# Publishes to npm after the same checks as CI (verify).
#
# Setup (one time):
# 1. npmjs.com → Access Tokens → Granular token (or "Automation") with permission to publish this package.
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret: NPM_TOKEN
#
# Release: bump "version" in package.json, commit, then:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run this workflow manually from the Actions tab (workflow_dispatch).

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Verify (typecheck, lint, format, test)
        run: npm run verify

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
